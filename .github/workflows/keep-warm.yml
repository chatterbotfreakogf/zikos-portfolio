# Hält den Karriere-Chatbot auf Render Free wach.
# Strategie: alle 10 Min ein /health-Ping, OFF-HOUR-Offset (GitHub Actions sind
# zur :00-Marke chronisch verspätet, daher 3,13,23,33,43,53).
# Render-Idle-Schwelle: 15 Min — 10 Min Intervall = 5 Min Puffer für Cron-Delays.
# Zweiter Layer: interner Self-Ping in chatbot/backend/app.py (ebenfalls 10 Min).
name: keep-warm

on:
  schedule:
    # Alle 10 Min, off-hour offset (3,13,23,33,43,53)
    - cron: "3-53/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Health-Ping mit Cold-Start-Retry
        run: |
          set -e
          URL="https://zikos-karriere-chatbot.onrender.com/health"
          for i in 1 2 3 4; do
            echo "::group::Ping #$i"
            START=$(date +%s)
            if curl -fsS --max-time 60 "$URL"; then
              ELAPSED=$((`date +%s` - START))
              echo ""
              echo "✓ alive in ${ELAPSED}s"
              echo "::endgroup::"
              exit 0
            fi
            echo ""
            echo "✗ ping failed (attempt $i), waiting 10s…"
            echo "::endgroup::"
            sleep 10
          done
          echo "::error::Bot reagiert nach 4 Versuchen nicht — Render-Maintenance?"
          exit 1
